<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Admin — {% if setup %}Setup{% else %}Login{% endif %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e8e8e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #16213e; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
        .login-box h1 { color: #e94560; font-size: 1.5em; margin-bottom: 8px; text-align: center; }
        .login-box p { color: #8899aa; font-size: 0.9em; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { color: #8899aa; font-size: 0.85em; display: block; margin-bottom: 4px; }
        input { width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; color: #e8e8e8; padding: 10px 12px; border-radius: 6px; font-size: 1em; }
        input:focus { border-color: #4ecca3; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; background: #4ecca3; color: #1a1a2e; margin-top: 8px; }
        .btn:hover { background: #3dbb92; }
        .flash { padding: 10px; border-radius: 6px; margin-bottom: 16px; text-align: center; font-size: 0.9em; }
        .flash-error { background: #4a1a2a; color: #e94560; }
        .flash-success { background: #1a4a3a; color: #4ecca3; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Maya Admin</h1>
        {% if setup %}
        <p>Crea tu cuenta de administrador</p>
        {% else %}
        <p>Inicia sesion</p>
        {% endif %}
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">{% if setup %}Crear cuenta{% else %}Entrar{% endif %}</button>
        </form>
    </div>
</body>
</html>
